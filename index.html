<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>KnowFlow Mobile | AI Knowledge Engine</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0b0620, #02010a);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      position: fixed;
    }

    /* Main app container — full screen flex column */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      background: rgba(8, 6, 22, 0.6);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    /* Header — compact but stylish */
    .mobile-header {
      padding: 0.9rem 1.2rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e9c0ff, #b77aff, #5ee0fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .logo-area p {
      font-size: 0.6rem;
      color: #bc9eff;
      letter-spacing: 0.2px;
      margin-top: 2px;
    }
    .user-badge {
      background: rgba(45, 35, 80, 0.7);
      padding: 0.4rem 0.9rem;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #9b6eff;
    }
    #userEmail {
      font-size: 0.7rem;
      font-weight: 500;
      color: #e3d4ff;
      max-width: 130px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .logout-btn {
      background: rgba(255, 70, 130, 0.2);
      border: none;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #ffb7d2;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .logout-btn:active {
      transform: scale(0.96);
      background: #ff3b6f;
      color: white;
    }

    /* Main scrollable content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      scroll-behavior: smooth;
    }

    /* Bottom navigation bar — mobile first */
    .bottom-nav {
      background: rgba(12, 10, 30, 0.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(139, 92, 246, 0.5);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.5rem 0.8rem;
      flex-shrink: 0;
      gap: 0.25rem;
    }
    .nav-btn {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: #b09eff;
      transition: all 0.2s;
      cursor: pointer;
      flex: 1;
      max-width: 85px;
    }
    .nav-btn i {
      font-size: 1.3rem;
      margin-bottom: 2px;
    }
    .nav-btn.active {
      background: rgba(139, 92, 246, 0.35);
      color: white;
      box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
    }
    .nav-btn:active {
      transform: scale(0.96);
    }

    /* Tab content panels */
    .tab-pane {
      display: none;
      animation: fadeSlideUp 0.25s ease;
    }
    .tab-pane.active-pane {
      display: block;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glass cards — full width, stack nicely */
    .glass-card {
      background: rgba(25, 22, 55, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.4rem;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(168, 85, 247, 0.5);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #cfbefa;
      margin-bottom: 0.4rem;
    }
    input, select, textarea {
      width: 100%;
      background: #0f0d24;
      border: 1px solid #5e43a3;
      padding: 0.9rem 1rem;
      border-radius: 1.4rem;
      color: #f2edff;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #c084fc;
      box-shadow: 0 0 0 2px rgba(192, 132, 252, 0.3);
      background: #15122e;
    }
    button {
      background: linear-gradient(105deg, #8b5cf6, #6d28d9);
      border: none;
      padding: 0.8rem 1.4rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      width: 100%;
    }
    button:active {
      transform: scale(0.97);
    }
    .danger-btn {
      background: linear-gradient(105deg, #e11d48, #be123c);
    }
    .secondary-btn {
      background: linear-gradient(105deg, #4c3b8c, #2a1e5a);
    }
    .doc-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 0.2rem;
    }
    .doc-item {
      background: rgba(35, 30, 70, 0.8);
      border-radius: 1.2rem;
      padding: 0.9rem;
      border-left: 5px solid #b77aff;
      transition: all 0.15s;
      cursor: pointer;
    }
    .doc-item:active {
      background: rgba(100, 70, 180, 0.7);
      transform: translateX(4px);
    }
    .doc-item h4 {
      color: #f3e8ff;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .doc-meta {
      font-size: 0.7rem;
      color: #bcadff;
      margin: 4px 0;
    }
    .doc-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.7rem;
    }
    .doc-actions button {
      padding: 0.4rem 0.8rem;
      font-size: 0.7rem;
      background: #5b3c9e;
      width: auto;
      flex: 1;
    }
    .empty-text {
      text-align: center;
      padding: 2rem;
      color: #bcadff;
      font-style: italic;
    }
    .result-wrapper {
      background: rgba(12, 10, 30, 0.7);
      border-radius: 1.6rem;
      margin: 1rem 0;
      border: 1px solid #b77aff;
      overflow: hidden;
    }
    .answer-primary {
      padding: 1.2rem;
      background: rgba(0, 0, 0, 0.3);
    }
    .answer-primary h3 {
      color: #e9d5ff;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .answer-content {
      color: #f5efff;
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .page-numbers-section {
      padding: 0.7rem 1rem;
      background: #110e28;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .page-chip {
      background: #6b46c0;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
    }
    /* toast mobile */
    .toast-stack {
      position: fixed;
      top: 0.8rem;
      left: 0.8rem;
      right: 0.8rem;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast-notify {
      background: #1f1a3ae6;
      backdrop-filter: blur(16px);
      border-left: 5px solid #c084fc;
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: 0 8px 20px black;
      pointer-events: auto;
      animation: slideDown 0.25s ease;
    }
    .toast-notify.error { border-left-color: #ff6b7c; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-notify.fade-out { animation: fadeOutUp 0.2s forwards; }
    @keyframes fadeOutUp {
      to { opacity: 0; transform: translateY(-20px); visibility: hidden; }
    }
    /* loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 5, 22, 0.92);
      backdrop-filter: blur(18px);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      color: #e2c7ff;
      font-weight: 500;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(168, 85, 247, 0.3);
      border-top: 3px solid #d98eff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* misc */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    h3, h4 {
      color: #e9d9ff;
    }
    .scroll-area {
      max-height: 45vh;
      overflow-y: auto;
    }
    button:disabled, input:disabled {
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- mobile header -->
  <div class="mobile-header">
    <div class="logo-area">
      <h1><i class="fas fa-bolt"></i> KnowFlow</h1>
      <p>mobile AI knowledge</p>
    </div>
    <div class="user-badge">
      <i class="fas fa-user-astronaut" style="color:#c084fc;"></i>
      <span id="userEmail">Not logged in</span>
      <button id="logoutBtn" class="logout-btn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Exit</button>
    </div>
  </div>

  <!-- scrollable main content -->
  <div class="main-content" id="mainContent">
    <!-- AUTH PANE -->
    <div id="authPane" class="tab-pane active-pane">
      <div class="glass-card">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-user-plus"></i> Create account</h3>
        <form id="signupForm">
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="signupEmail" placeholder="you@knowflow.ai" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-key"></i> Password</label>
            <input type="password" id="signupPassword" placeholder="••••••••" required>
          </div>
          <button type="submit"><i class="fas fa-arrow-right-to-bracket"></i> Sign up →</button>
        </form>
      </div>
      <div class="glass-card">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-unlock-alt"></i> Sign in</h3>
        <form id="loginForm">
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="loginPassword" required>
          </div>
          <button type="submit"><i class="fas fa-sign-in-alt"></i> Login →</button>
        </form>
      </div>
    </div>

    <!-- UPLOAD PANE -->
    <div id="uploadPane" class="tab-pane">
      <div class="glass-card">
        <h3 style="margin-bottom: 0.8rem;"><i class="fas fa-cloud-upload-alt"></i> Upload document</h3>
        <form id="uploadForm" enctype="multipart/form-data">
          <div class="form-group">
            <label><i class="fas fa-file-pdf"></i> File (PDF/TXT)</label>
            <input type="file" id="documentFile" accept=".pdf,.txt,.md" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-tag"></i> Source / category</label>
            <input type="text" id="source" placeholder="e.g., manual, research">
          </div>
          <button type="submit"><i class="fas fa-arrow-up"></i> Upload & Index</button>
        </form>
      </div>
    </div>

    <!-- DOCUMENTS PANE -->
    <div id="docsPane" class="tab-pane">
      <div class="flex-between">
        <h3><i class="fas fa-folder-open"></i> Your library</h3>
        <button id="loadDocsBtn" style="width: auto; padding: 0.4rem 1rem;" class="secondary-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
      <div id="docsList" class="doc-grid">
        <p class="empty-text"><i class="fas fa-spinner fa-pulse"></i> Login to see documents</p>
      </div>
    </div>

    <!-- ASK PANE (search) -->
    <div id="askPane" class="tab-pane">
      <div class="glass-card">
        <h3><i class="fas fa-robot"></i> Ask your documents</h3>
        <form id="searchForm">
          <div class="form-group">
            <label><i class="fas fa-fingerprint"></i> Document ID (tap a doc below)</label>
            <input type="text" id="documentId" placeholder="Select from library">
          </div>
          <div class="form-group">
            <label><i class="fas fa-question-circle"></i> Your question</label>
            <textarea id="queryText" rows="3" placeholder="e.g., Summarize the main points..."></textarea>
          </div>
          <button type="submit" id="searchBtn"><i class="fas fa-wand-magic"></i> Get answer</button>
        </form>
      </div>

      <div id="searchResult" class="result-wrapper">
        <div class="answer-primary" style="opacity:0.7; text-align:center;">
          <i class="fas fa-sparkles"></i> Awaiting query — answers appear here
        </div>
      </div>

      <div class="glass-card" style="margin-top: 0.5rem;">
        <h4 style="margin-bottom: 0.5rem;"><i class="fas fa-layer-group"></i> Tap any document to use ID</h4>
        <div id="searchDocsList" class="doc-grid" style="max-height: 38vh;">
          <p class="empty-text"><i class="fas fa-lock"></i> Login to access docs</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom navigation bar -->
  <div class="bottom-nav" id="bottomNav">
    <button class="nav-btn" data-pane="authPane"><i class="fas fa-lock"></i><span>Vault</span></button>
    <button class="nav-btn" data-pane="uploadPane" style="display: none;"><i class="fas fa-cloud-upload-alt"></i><span>Upload</span></button>
    <button class="nav-btn" data-pane="docsPane" style="display: none;"><i class="fas fa-folder-open"></i><span>Library</span></button>
    <button class="nav-btn" data-pane="askPane" style="display: none;"><i class="fas fa-magnifying-glass"></i><span>Ask</span></button>
  </div>
</div>

<div id="toastRoot" class="toast-stack"></div>
<div id="globalOverlay" style="display: none;" class="loading-overlay"><div class="spinner"></div><div><i class="fas fa-brain"></i> Processing...</div></div>

<script>
  // ============ BACKEND LOGIC UNCHANGED — 100% IDENTICAL API INTERACTION ============
  const BASE_URL = "https://api.knowflow-ai.online";
  let isProcessing = false;

  function setLoading(loading) {
    isProcessing = loading;
    const overlay = document.getElementById("globalOverlay");
    if (loading) {
      overlay.style.display = "flex";
      document.querySelectorAll("button, input, select, textarea, .nav-btn").forEach(el => el.disabled = true);
    } else {
      overlay.style.display = "none";
      document.querySelectorAll("button, input, select, textarea, .nav-btn").forEach(el => el.disabled = false);
    }
  }

  function showMessage(msg, type = "success") {
    const toastContainer = document.getElementById("toastRoot");
    const toast = document.createElement("div");
    toast.className = `toast-notify ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
    toastContainer.appendChild(toast);
    setTimeout(() => {
      toast.classList.add("fade-out");
      setTimeout(() => { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 200);
    }, 3200);
  }

  function saveToken(token, email) {
    localStorage.setItem("token", token);
    localStorage.setItem("email", email);
    localStorage.setItem("login_time", Date.now());
    updateUserUI();
    showLoggedInTabs();
    if(token) loadDocumentsForAll();
  }
  function getToken() { return localStorage.getItem("token"); }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("email");
    localStorage.removeItem("login_time");
    updateUserUI();
    showLoggedOutTabs();
    document.getElementById("docsList").innerHTML = `<p class="empty-text"><i class="fas fa-lock"></i> Login to view library.</p>`;
    document.getElementById("searchDocsList").innerHTML = `<p class="empty-text"><i class="fas fa-lock"></i> Please login to access documents.</p>`;
    document.getElementById("searchResult").innerHTML = `<div class="answer-primary" style="opacity:0.7; text-align:center;">✨ Session ended. Sign in to continue.</div>`;
    showMessage("Logged out", "success");
    // switch to auth pane
    switchToPane("authPane");
  }

  function updateUserUI() {
    const email = localStorage.getItem("email");
    const logoutBtn = document.getElementById("logoutBtn");
    const userSpan = document.getElementById("userEmail");
    if (email) {
      userSpan.innerHTML = `<i class="fas fa-user-circle"></i> ${email.substring(0, 16)}${email.length > 16 ? '..' : ''}`;
      logoutBtn.style.display = "flex";
    } else {
      userSpan.innerHTML = `Not logged in`;
      logoutBtn.style.display = "none";
    }
  }

  function showLoggedInTabs() {
    const navBtns = document.querySelectorAll(".nav-btn");
    navBtns.forEach(btn => {
      const pane = btn.getAttribute("data-pane");
      if (pane === "authPane") btn.style.display = "none";
      else btn.style.display = "flex";
    });
  }

  function showLoggedOutTabs() {
    const navBtns = document.querySelectorAll(".nav-btn");
    navBtns.forEach(btn => {
      const pane = btn.getAttribute("data-pane");
      if (pane === "authPane") btn.style.display = "flex";
      else btn.style.display = "none";
    });
  }

  function switchToPane(paneId) {
    document.querySelectorAll(".tab-pane").forEach(pane => pane.classList.remove("active-pane"));
    document.getElementById(paneId).classList.add("active-pane");
    document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
    const activeBtn = Array.from(document.querySelectorAll(".nav-btn")).find(btn => btn.getAttribute("data-pane") === paneId);
    if (activeBtn) activeBtn.classList.add("active");
  }

  function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  async function loadDocumentsForAll() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BASE_URL}/document/show`, {
        method: "GET", headers: { "Authorization": `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Cannot fetch");
      const docs = data.docs || [];
      renderDocumentsList(docs, "docsList");
      renderDocumentsList(docs, "searchDocsList", true);
      showMessage("Library refreshed", "success");
    } catch (err) {
      showMessage("Error: " + err.message, "error");
    }
  }

  function renderDocumentsList(docs, containerId, clickToFill = false) {
    const container = document.getElementById(containerId);
    if (!docs.length) {
      container.innerHTML = `<p class="empty-text"><i class="fas fa-inbox"></i> No documents. Upload first.</p>`;
      return;
    }
    container.innerHTML = docs.map(doc => {
      const docId = String(doc.id ?? '');
      const filename = String(doc.filename ?? '');
      const source = String(doc.source ?? '-');
      const status = String(doc.status ?? 'active');
      return `
        <div class="doc-item" data-doc-id="${escapeHtml(docId)}">
          <h4><i class="fas fa-file-alt"></i> ${escapeHtml(filename)}</h4>
          <div class="doc-meta"><i class="fas fa-id-card"></i> ID: ${escapeHtml(docId)}</div>
          <div class="doc-meta"><i class="fas fa-tag"></i> ${escapeHtml(source)} | ${escapeHtml(status)}</div>
          <div class="doc-actions">
            <button class="fill-search-btn" data-id="${escapeHtml(docId)}"><i class="fas fa-crosshairs"></i> Use</button>
            <button class="danger-btn delete-doc-btn" data-id="${escapeHtml(docId)}"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        </div>
      `;
    }).join("");
    container.querySelectorAll(".fill-search-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const docId = btn.getAttribute("data-id");
        document.getElementById("documentId").value = docId;
        showMessage(`ID loaded: ${docId}`, "success");
        switchToPane("askPane");
      });
    });
    container.querySelectorAll(".delete-doc-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        e.stopPropagation();
        const docId = btn.getAttribute("data-id");
        await deleteDocumentById(docId);
      });
    });
    if (clickToFill) {
      container.querySelectorAll(".doc-item").forEach(item => {
        item.addEventListener("click", (e) => {
          if (e.target.tagName === 'BUTTON') return;
          const docId = item.getAttribute("data-doc-id");
          if(docId) document.getElementById("documentId").value = docId;
          showMessage(`ID inserted: ${docId}`, "success");
          switchToPane("askPane");
        });
      });
    }
  }

  async function deleteDocumentById(docId) {
    const token = getToken();
    if (!token || isProcessing) return;
    setLoading(true);
    try {
      const res = await fetch(`${BASE_URL}/document/${docId}`, {
        method: "DELETE", headers: { "Authorization": `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Deletion failed");
      showMessage("Document deleted", "success");
      await loadDocumentsForAll();
    } catch (err) { showMessage("Delete error: " + err.message, "error"); }
    finally { setLoading(false); }
  }

  // ---- AUTH & API handlers ----
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault(); if(isProcessing) return;
    setLoading(true);
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    try {
      const res = await fetch(`${BASE_URL}/auth/signup`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Signup failed");
      saveToken(data.token, data.email);
      showMessage("Account created! Welcome.", "success");
      switchToPane("askPane");
    } catch (err) { showMessage(err.message, "error"); } finally { setLoading(false); }
  });
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault(); if(isProcessing) return;
    setLoading(true);
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    try {
      const res = await fetch(`${BASE_URL}/auth/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Login failed");
      saveToken(data.token, data.email);
      showMessage("Authentication success", "success");
      switchToPane("askPane");
    } catch (err) { showMessage(err.message, "error"); } finally { setLoading(false); }
  });
  document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault(); if(isProcessing) return;
    const token = getToken();
    if (!token) { showMessage("Please login", "error"); return; }
    const file = document.getElementById("documentFile").files[0];
    const source = document.getElementById("source").value;
    if (!file) { showMessage("Select a file", "error"); return; }
    setLoading(true);
    const formData = new FormData();
    formData.append("document", file);
    formData.append("source", source);
    try {
      const res = await fetch(`${BASE_URL}/add/document`, { method: "POST", headers: { "Authorization": `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Upload failed");
      showMessage("Document Uploaded", "success");
      await loadDocumentsForAll();
      document.getElementById("uploadForm").reset();
    } catch (err) { showMessage("Upload error: " + err.message, "error"); } finally { setLoading(false); }
  });
  document.getElementById("searchForm").addEventListener("submit", async (e) => {
    e.preventDefault(); if(isProcessing) return;
    const token = getToken();
    if (!token) { showMessage("Login required", "error"); return; }
    const document_id = document.getElementById("documentId").value.trim();
    const query = document.getElementById("queryText").value.trim();
    if (!document_id || !query) { showMessage("Document ID & query required", "error"); return; }
    setLoading(true);
    try {
      const params = new URLSearchParams(); params.append("doc_id", document_id); params.append("query", query);
      const res = await fetch(`${BASE_URL}/search?${params.toString()}`, { method: "POST", headers: { "Authorization": `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Search failed");
      const answerRaw = data.result || "No relevant answer found.";
      const pages = data.page || [];
      const formatted = answerRaw.replace(/\\n/g, "\n").split("\n").filter(l=>l.trim()).map(l=>`<p>${escapeHtml(l)}</p>`).join("");
      let pageBlock = pages && pages.length ? `<div class="page-numbers-section"><i class="fas fa-book-open"></i> <span>📖 References:</span> ${[...new Set(pages)].map(p=>`<span class="page-chip">📄 ${escapeHtml(p)}</span>`).join("")}</div>` : `<div class="page-numbers-section"><span>🔗 No page metadata</span></div>`;
      document.getElementById("searchResult").innerHTML = `<div class="answer-primary"><h3><i class="fas fa-lightbulb"></i> Answer</h3><div class="answer-content">${formatted || `<p>${escapeHtml(answerRaw)}</p>`}</div></div>${pageBlock}`;
      showMessage("Answer ready", "success");
    } catch (err) { showMessage("Search error: " + err.message, "error"); } finally { setLoading(false); }
  });
  document.getElementById("loadDocsBtn").addEventListener("click", async () => { if(!isProcessing){ setLoading(true); await loadDocumentsForAll(); setLoading(false); } });
  document.getElementById("logoutBtn").addEventListener("click", () => { if(!isProcessing) logout(); });
  // bottom navigation
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if(isProcessing) { showMessage("Please wait", "error"); return; }
      const paneId = btn.getAttribute("data-pane");
      if(paneId) switchToPane(paneId);
    });
  });
  // initial state
  if(getToken()) { 
    updateUserUI(); 
    showLoggedInTabs(); 
    loadDocumentsForAll(); 
    switchToPane("askPane");
  } else { 
    showLoggedOutTabs(); 
    switchToPane("authPane");
  }
  // session timeout
  setInterval(() => { const loginTime = localStorage.getItem("login_time"); if(loginTime && (Date.now() - parseInt(loginTime) > 30*60*1000)) logout(); }, 60000);
</script>
</body>
</html>
